    <h2 style="text-align: center;margin-top: 20PX;">View Patient</h2>


<div *ngIf="patient$ | async as patient" class="container">
    <label>ID: <b>{{ patient.id }}</b></label>
    <label>Name: <b>{{ patient.name }}</b></label>
    <label>Age: <b>{{ patient.age }}</b></label>
    <label>Blood: <b>{{ patient.blood }}</b></label>
    <label>Prescription: <b>{{ patient.prescription }}</b></label>
    <label>Dose: <b>{{ patient.dose }}</b></label>
    <label>Fees: <b>{{ patient.fees }}</b></label>
    <label>Urgency: <b>{{ patient.urgency }}</b></label>
</div>
