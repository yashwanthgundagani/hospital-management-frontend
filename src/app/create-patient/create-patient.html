<div class="container">
    <h2 class="text-center">Add new patient</h2>

    <form (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" name="name" placeholder="Enter Name" class="form-control" [(ngModel)]="patient.name" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="text" id="age" name="age" placeholder="Enter Age" class="form-control" [(ngModel)]="patient.age" required>
        </div>

        <div class="form-group">
            <label>Blood</label>
            <input type="text" id="blood" name="blood" placeholder="Enter Blood Group" class="form-control" [(ngModel)]="patient.blood" required>
        </div>

        <div class="form-group">
            <label>Prescription</label>
            <input type="text" id="prescription" name="prescription" placeholder="Enter Prescription" class="form-control" [(ngModel)]="patient.prescription" required>
        </div>

        <div class="form-group">
            <label>Dose</label>
            <input type="text" id="dose" name="dose" placeholder="Enter Dose" class="form-control" [(ngModel)]="patient.dose" required>
        </div>

        <div class="form-group">
            <label>Fees</label>
            <input type="text" id="fees" name="fees" placeholder="Enter Fees" class="form-control" [(ngModel)]="patient.fees" required>
        </div>

        <div class="form-group">
            <label>Urgency</label>
            <input type="text" id="urgency" name="urgency" placeholder="Enter Urgency" class="form-control" [(ngModel)]="patient.urgency" required>
        </div>

         <button type="submit" class="btn btn-success">Submit</button>

    </form>
</div>
